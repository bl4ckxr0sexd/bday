<!DOCTYPE html>
<!--
  This file is a TEMPLATE. Do not edit the generated public/index.html directly.
  Change values in .env, then run `npm run build`. Tokens like {{COUSIN_NAME}}
  are replaced at build time.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff6b8a" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎉</text></svg>" />
  <title>You're Invited! 🎉 {{COUSIN_NAME}}'s Birthday</title>
  <meta name="description" content="You're invited to {{COUSIN_NAME}}'s birthday! Tap to download your invitation — all the details are inside." />

  <!-- Open Graph: nice preview when the link is shared in chats -->
  <meta property="og:title" content="You're Invited to {{COUSIN_NAME}}'s Birthday Bash! 🎉" />
  <meta property="og:description" content="{{PARTY_DATE}} · {{PARTY_TIME}} · Tap to open your invitation!" />
  <meta property="og:type" content="website" />

  <!-- Fonts: Fredoka (playful display) + Poppins (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===================== DESIGN TOKENS ===================== */
    :root {
      --coral:        #ff6b8a;
      --coral-soft:   #ff8fa3;
      --sky:          #5bc0eb;
      --yellow:       #ffd166;
      --ink:          #3a2b3f;
      --muted:        #a394ab;

      --radius-lg: 28px;
      --radius-pill: 999px;

      --shadow-card: 0 18px 44px rgba(255, 107, 138, 0.16);

      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ===================== RESET / BASE ===================== */
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: var(--ink);
      background: radial-gradient(1200px 600px at 15% -5%, #ffe3ea 0%, transparent 55%),
                  radial-gradient(1000px 700px at 100% 10%, #dff3ff 0%, transparent 50%),
                  linear-gradient(160deg, #fff2f5 0%, #fff9f0 45%, #eaf7ff 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    /* ===================== FLOATING BALLOON DECOR ===================== */
    .decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .balloon {
      position: absolute;
      font-size: clamp(1.6rem, 4vw, 3rem);
      opacity: 0.6;
      animation: float 9s var(--ease) infinite;
    }
    .balloon:nth-child(1) { left: 6%;  top: 16%; animation-delay: 0s;   }
    .balloon:nth-child(2) { left: 85%; top: 12%; animation-delay: 1.2s; }
    .balloon:nth-child(3) { left: 88%; top: 66%; animation-delay: 2.4s; }
    .balloon:nth-child(4) { left: 5%;  top: 72%; animation-delay: 0.6s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-22px) rotate(4deg); }
    }

    /* ===================== LAYOUT (single centered screen) ============ */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      max-width: 540px;
      margin: 0 auto;
      padding: clamp(20px, 5vw, 40px) clamp(16px, 5vw, 24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
    }

    /* ===================== INVITATION CARD ===================== */
    .invite {
      position: relative;
      width: 100%;
      color: #fff;
      border-radius: var(--radius-lg);
      padding: clamp(36px, 7vw, 56px) clamp(24px, 6vw, 44px);
      background: linear-gradient(135deg, var(--coral-soft) 0%, var(--coral) 48%, var(--sky) 135%);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      animation: rise 0.7s var(--ease) both;
    }
    .invite::after {
      /* subtle glossy sheen */
      content: "";
      position: absolute;
      top: -40%; left: -20%;
      width: 140%; height: 80%;
      background: radial-gradient(closest-side, rgba(255,255,255,0.28), transparent);
      pointer-events: none;
    }
    .confetti-row { font-size: clamp(1.4rem, 4vw, 2rem); letter-spacing: 6px; margin-bottom: 14px; }
    .pill {
      display: inline-block;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: var(--radius-pill);
    }
    .invite h1 {
      font-family: 'Fredoka', 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(2.4rem, 9vw, 3.8rem);
      line-height: 1.05;
      margin: 20px 0 10px;
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.14);
    }
    .invite .subtitle {
      font-size: clamp(0.98rem, 3.4vw, 1.15rem);
      font-weight: 500;
      opacity: 0.95;
      margin: 0 auto;
      max-width: 30ch;
    }

    /* ===================== DOWNLOAD BUTTON ===================== */
    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 28px;
      background: #ffffff;
      color: var(--coral);
      font-family: 'Fredoka', 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(1.05rem, 3.6vw, 1.3rem);
      text-decoration: none;
      padding: 18px 44px;
      border-radius: var(--radius-pill);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-download:hover  { transform: translateY(-3px) scale(1.02); box-shadow: 0 20px 42px rgba(0, 0, 0, 0.24); }
    .btn-download:active { transform: translateY(0) scale(0.99); }
    .btn-download .arrow { transition: transform 0.25s var(--ease); }
    .btn-download:hover .arrow { transform: translateX(4px); }

    .cta-note { margin: 14px 0 0; font-size: 12px; color: rgba(255, 255, 255, 0.85); }

    /* ===================== FOOTER ===================== */
    footer {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    footer .heart { color: var(--coral); }

    /* ===================== ANIMATIONS ===================== */
    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Respect reduced-motion preferences */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>

<body>
  <!-- Floating decorative balloons (aria-hidden: purely decorative) -->
  <div class="decor" aria-hidden="true">
    <span class="balloon">🎈</span>
    <span class="balloon">🎈</span>
    <span class="balloon">🎉</span>
    <span class="balloon">✨</span>
  </div>

  <main class="page">

    <!-- ===================== INVITATION ===================== -->
    <section class="invite" aria-labelledby="hero-heading">
      <div class="confetti-row" aria-hidden="true">🎂 🎁 🎈</div>
      <span class="pill">You're Invited</span>
      <h1 id="hero-heading">{{COUSIN_NAME}}'s<br />Birthday Bash!</h1>
      <p class="subtitle">You're invited to celebrate! Tap below to open your invitation — every detail is inside.</p>

      <a id="downloadBtn"
         class="btn-download"
         href="{{DOWNLOAD_URL}}"
         target="_blank"
         rel="noopener noreferrer">
        <span aria-hidden="true">⬇️</span>
        Download Invitation
        <span class="arrow" aria-hidden="true">→</span>
      </a>

      <p class="cta-note">Opens in a new tab · Date, time &amp; venue are inside</p>
    </section>

    <!-- ===================== FOOTER ===================== -->
    <footer>
      Made with <span class="heart">♥</span> for {{COUSIN_NAME}}'s big day
    </footer>

  </main>

  <!--
  ============================================================================
   VISITOR TRACKING ENGINE
  ============================================================================
   The TRACKING_ENDPOINT below is injected from .env at build time — you do
   NOT edit it here. Set TRACKING_ENDPOINT in .env (the Web App URL from
   webapp.js, ending in /exec) and run `npm run build`. Leave it blank to
   disable tracking; the page still works and just logs a console notice.

   What this does:
     1. Fetches the visitor's IP / ISP (org) / country from a free public API.
     2. Uses localStorage to mark unique vs returning visitors.
     3. POSTs a "page_view" event immediately.
     4. POSTs a "download_click" event when the Download button is clicked.
  ============================================================================
  -->
  <script>
    (function () {
      "use strict";

      // Injected from .env → do not edit here.
      var TRACKING_ENDPOINT = "{{TRACKING_ENDPOINT}}";

      var GEO_API = "https://ipapi.co/json/";
      var STORAGE_KEY = "birthday_invite_visitor";

      // --- Helpers -----------------------------------------------------------

      // Is the endpoint actually configured? Avoids firing to a placeholder.
      function isEndpointConfigured() {
        return (
          typeof TRACKING_ENDPOINT === "string" &&
          TRACKING_ENDPOINT.indexOf("http") === 0 &&
          TRACKING_ENDPOINT.indexOf("PASTE_YOUR") === -1
        );
      }

      // Human-readable local timestamp, e.g. "Sun, Jul 12, 2026, 04:30:15 PM"
      function readableTimestamp() {
        try {
          return new Date().toLocaleString(undefined, {
            weekday: "short", year: "numeric", month: "short", day: "numeric",
            hour: "2-digit", minute: "2-digit", second: "2-digit"
          });
        } catch (e) {
          return new Date().toString();
        }
      }

      // Determine unique vs returning using localStorage. Returns a status obj.
      function resolveVisitorStatus() {
        var status = { isUnique: true, firstSeen: null, visitCount: 1 };
        try {
          var raw = window.localStorage.getItem(STORAGE_KEY);
          if (raw) {
            var saved = JSON.parse(raw);
            status.isUnique = false;
            status.firstSeen = saved.firstSeen || null;
            status.visitCount = (saved.visitCount || 1) + 1;
          } else {
            status.firstSeen = new Date().toISOString();
          }
          window.localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({ firstSeen: status.firstSeen, visitCount: status.visitCount })
          );
        } catch (e) {
          // localStorage blocked (private mode / cookies off) — treat as unique,
          // don't break the page.
        }
        return status;
      }

      // Fetch geo/network info; always resolves (never rejects) so tracking
      // still fires even if the geo API is down or rate-limited.
      function fetchNetworkInfo() {
        if (!window.fetch) {
          return Promise.resolve({ ip: "unknown", isp: "unknown", country: "unknown" });
        }
        return fetch(GEO_API, { method: "GET" })
          .then(function (res) { return res.ok ? res.json() : {}; })
          .then(function (data) {
            return {
              ip: data.ip || "unknown",
              isp: data.org || "unknown",          // "org" is the ISP/organization
              country: data.country_name || data.country || "unknown",
              region: data.region || "",
              city: data.city || ""
            };
          })
          .catch(function () {
            return { ip: "unknown", isp: "unknown", country: "unknown", region: "", city: "" };
          });
      }

      // Send a JSON payload to the endpoint.
      // Uses sendBeacon when available (survives page unload / new-tab nav),
      // falls back to fetch with keepalive.
      function sendEvent(payload) {
        if (!isEndpointConfigured()) {
          // Helpful during setup: log instead of silently doing nothing.
          console.warn("[tracking] TRACKING_ENDPOINT not set — event NOT sent:", payload);
          return;
        }
        var body = JSON.stringify(payload);
        try {
          if (navigator.sendBeacon) {
            // text/plain avoids a CORS preflight against Apps Script.
            var blob = new Blob([body], { type: "text/plain;charset=UTF-8" });
            var ok = navigator.sendBeacon(TRACKING_ENDPOINT, blob);
            if (ok) return;
          }
        } catch (e) { /* fall through to fetch */ }

        if (window.fetch) {
          fetch(TRACKING_ENDPOINT, {
            method: "POST",
            mode: "no-cors",            // Apps Script doesn't send CORS headers
            keepalive: true,
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: body
          }).catch(function (err) {
            console.warn("[tracking] send failed:", err);
          });
        }
      }

      // Build the shared payload with event name + network + status details.
      function buildPayload(eventName, net, status) {
        return {
          event: eventName,
          isUnique: status.isUnique,
          visitorType: status.isUnique ? "new" : "returning",
          visitCount: status.visitCount,
          ip: net.ip,
          isp: net.isp,
          country: net.country,
          region: net.region,
          city: net.city,
          timestamp: readableTimestamp(),
          isoTimestamp: new Date().toISOString(),
          page: window.location.href,
          referrer: document.referrer || "direct",
          userAgent: navigator.userAgent,
          language: navigator.language || "unknown"
        };
      }

      // --- Main flow ---------------------------------------------------------

      var visitorStatus = resolveVisitorStatus();

      // Cache the network info so the download_click doesn't re-fetch.
      var networkInfoPromise = fetchNetworkInfo();

      // Fire the page_view as soon as we have network info.
      networkInfoPromise.then(function (net) {
        sendEvent(buildPayload("page_view", net, visitorStatus));
      });

      // Track the download button click.
      var downloadBtn = document.getElementById("downloadBtn");
      if (downloadBtn) {
        downloadBtn.addEventListener("click", function () {
          networkInfoPromise.then(function (net) {
            sendEvent(buildPayload("download_click", net, visitorStatus));
          });
          // We do NOT preventDefault — the link opens normally in a new tab.
        });
      }
    })();
  </script>
</body>
</html>
